<div class="page-shell">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="page-title">Gestión de solicitudes</h1>
        <p class="page-subtitle">Control y seguimiento de solicitudes sacramentales.</p>
      </div>
  
      <button class="ecclesia-btn">
        <i class="bi bi-plus-circle me-2"></i>
        Nueva solicitud
      </button>
    </div>
  
    <div class="ecclesia-card p-4">
      <div class="table-responsive">
        <table class="table align-middle ecclesia-table mb-0">
          <thead>
            <tr>
              <th>Fiel</th>
              <th>Sacramento</th>
              <th>Estado</th>
              <th>Fecha</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody>
            @for (item of solicitudes; track item.fiel + item.fecha) {
              <tr>
                <td>{{ item.fiel }}</td>
                <td>{{ item.sacramento }}</td>
                <td>{{ item.estado }}</td>
                <td>{{ item.fecha }}</td>
                <td class="text-end">
                  <button class="btn btn-sm btn-outline-primary me-2">Ver</button>
                  <button class="btn btn-sm btn-outline-secondary">Editar</button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
