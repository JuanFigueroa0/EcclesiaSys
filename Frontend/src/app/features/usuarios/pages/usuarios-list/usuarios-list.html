<div class="page-shell">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="page-title">Gestión de usuarios</h1>
        <p class="page-subtitle">Consulta, registra y administra usuarios del sistema.</p>
      </div>
  
      <button class="ecclesia-btn">
        <i class="bi bi-person-plus me-2"></i>
        Nuevo usuario
      </button>
    </div>
  
    <div class="ecclesia-card p-4">
      <div class="table-responsive">
        <table class="table align-middle ecclesia-table mb-0">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Rol</th>
              <th>Estado</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody>
            @for (item of usuarios; track item.correo) {
              <tr>
                <td>{{ item.nombre }}</td>
                <td>{{ item.correo }}</td>
                <td>{{ item.rol }}</td>
                <td><span class="badge text-bg-success">{{ item.estado }}</span></td>
                <td class="text-end">
                  <button class="btn btn-sm btn-outline-primary me-2">Editar</button>
                  <button class="btn btn-sm btn-outline-danger">Eliminar</button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
