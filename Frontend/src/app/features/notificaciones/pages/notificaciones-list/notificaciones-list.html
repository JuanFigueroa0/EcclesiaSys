<div class="pg-wrap p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="h3 mb-1 font-weight-bold">Centro de Notificaciones</h1>
      <p class="text-muted mb-0">Alertas del sistema y solicitudes recientes</p>
    </div>
    <button class="btn btn-outline-secondary" (click)="marcarTodasLeidas()">
      <i class="bi bi-check-all me-1"></i>Marcar todas como leídas
    </button>
  </div>

  <div class="mb-4">
    <div class="btn-group" role="group">
      <button type="button" class="btn btn-outline-primary" [class.active]="filtro === 'todas'" (click)="filtro = 'todas'">
        Todas
      </button>
      <button type="button" class="btn btn-outline-primary" [class.active]="filtro === 'noleidas'" (click)="filtro = 'noleidas'">
        No leídas
      </button>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="list-group list-group-flush">
      @for (n of notificacionesFiltradas; track n.id) {
        <div class="list-group-item p-3 border-bottom d-flex align-items-center justify-content-between" [class.bg-light]="!n.leida">
          <div class="d-flex align-items-start gap-3">
            <div class="fs-3">
              <i class="bi {{ getIcon(n.tipo) }}"></i>
            </div>
            <div>
              <div class="d-flex align-items-center gap-2">
                <h6 class="mb-1 font-weight-bold">{{ n.titulo }}</h6>
                @if (!n.leida) {
                  <span class="badge bg-primary rounded-pill">Nueva</span>
                }
              </div>
              <p class="mb-1 text-muted">{{ n.mensaje }}</p>
              <small class="text-secondary">{{ n.fecha }}</small>
            </div>
          </div>
          @if (!n.leida) {
            <button class="btn btn-sm btn-link text-decoration-none" (click)="marcarLeida(n)">
              Marcar como leída
            </button>
          }
        </div>
      } @empty {
        <div class="p-5 text-center text-muted">
          <i class="bi bi-bell-slash fs-1 d-block mb-2 text-secondary"></i>
          No hay notificaciones para mostrar.
        </div>
      }
    </div>
  </div>
</div>
