<header class="topbar">
  <div class="topbar-left">
    <button type="button" class="topbar-menu-btn" (click)="menuClick.emit()">
      <i class="bi bi-list"></i>
    </button>

    <a routerLink="/app/dashboard" class="topbar-titulo text-decoration-none text-reset">
      <span class="topbar-cruz">✝</span>
      <span>EcclesiaSys</span>
    </a>
  </div>

  <div class="topbar-right">
    <button type="button" class="topbar-icon-btn position-relative" (click)="irANotificaciones()" title="Ver Notificaciones">
      <i class="bi bi-bell"></i>
      @if (unreadNotifCount() > 0) {
        <span class="topbar-noti-badge">{{ unreadNotifCount() }}</span>
      }
    </button>

    <div class="topbar-user-box">
      <div class="topbar-avatar">
        {{ initial() }}
      </div>

      <div class="d-none d-md-block">

        <div class="topbar-user-correo">
          {{ fullName() }}
        </div>

        <div class="topbar-user-rol">
          {{ role() }}
        </div>

      </div>

      <button type="button" class="btn btn-sm btn-outline-danger ms-2" (click)="logout()">
        Salir
      </button>
    </div>
  </div>
</header>
